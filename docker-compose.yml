services:
  app:
    build:
      context: .
      target: production
      args:
        NODE_VERSION: 22-alpine
    init: true
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      NUXT_HOST: 0.0.0.0
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      PORT: 3000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped
