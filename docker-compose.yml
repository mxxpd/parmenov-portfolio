services:
  app:
    build:
      context: .
      target: production
      args:
        NODE_VERSION: 22-alpine
    init: true
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      NUXT_HOST: 0.0.0.0
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      PORT: 3000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    ports:
      - "3000:3000"
    restart: unless-stopped
