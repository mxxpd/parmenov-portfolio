services:
  app:
    build:
      context: .
      target: dev
      args:
        NODE_VERSION: 22-alpine
    init: true
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      NUXT_HOST: 0.0.0.0
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      PORT: 3000
      NUXT_PORT: 3000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - nuxt:/app/.nuxt
    command: ["npm", "run", "dev:local", "--", "--host", "0.0.0.0", "--port", "3000"]

volumes:
  node_modules:
  nuxt:
